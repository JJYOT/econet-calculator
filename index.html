<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECONET Laskin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="glass-container">
        <div class="language-selector">
            <button class="lang-btn active" data-lang="fi" title="Suomi">
                <svg viewBox="0 0 18 11" width="24" height="15">
                    <rect width="18" height="11" fill="#fff" />
                    <rect width="18" height="3" y="4" fill="#003580" />
                    <rect width="3" height="11" x="5" fill="#003580" />
                </svg>
            </button>
            <button class="lang-btn" data-lang="sv" title="Svenska">
                <svg viewBox="0 0 16 10" width="24" height="15">
                    <rect width="16" height="10" fill="#006aa7" />
                    <rect width="16" height="2" y="4" fill="#fecc00" />
                    <rect width="2" height="10" x="5" fill="#fecc00" />
                </svg>
            </button>
            <button class="lang-btn" data-lang="en" title="English">
                <svg viewBox="0 0 60 30" width="24" height="12">
                    <clipPath id="s">
                        <path d="M0,0 v30 h60 v-30 z" />
                    </clipPath>
                    <clipPath id="t">
                        <path d="M30,15 h30 v15 z v-15 h-30 z h-30 v-15 z v15 h30 z" />
                    </clipPath>
                    <g clip-path="url(#s)">
                        <path d="M0,0 v30 h60 v-30 z" fill="#012169" />
                        <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6" />
                        <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#t)" stroke="#C8102E" stroke-width="4" />
                        <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10" />
                        <path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6" />
                    </g>
                </svg>
            </button>
        </div>

        <header>
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <h1 id="t-title">ECONET</h1>
            <p id="t-subtitle">Lämpötilahyötysuhteen laskin</p>
        </header>

        <form id="calculator-form">
            <div class="input-group">
                <label for="ulko" id="t-ulko">Ulkoilman lämpötila (°C)</label>
                <div class="input-wrapper">
                    <input type="number" step="0.1" id="ulko" required placeholder="-10.5">
                    <span class="unit">°C</span>
                </div>
            </div>

            <div class="input-group">
                <label for="tulo" id="t-tulo">Tuloilman lämpötila LTO jälkeen (°C)</label>
                <div class="input-wrapper">
                    <input type="number" step="0.1" id="tulo" required placeholder="18.0">
                    <span class="unit">°C</span>
                </div>
            </div>

            <div class="input-group">
                <label for="poisto" id="t-poisto">Poistoilman lämpötila (°C)</label>
                <div class="input-wrapper">
                    <input type="number" step="0.1" id="poisto" required placeholder="21.0">
                    <span class="unit">°C</span>
                </div>
            </div>

            <div class="flow-group">
                <div class="input-group half optional">
                    <label for="flow-tulo"><span id="t-flowtulo">Tuloilma</span> <span class="opt-tag"
                            id="t-opt1">Valinn.</span></label>
                    <div class="input-wrapper">
                        <input type="number" step="0.01" id="flow-tulo" placeholder="esim. 0.8">
                        <span class="unit">m³/s</span>
                    </div>
                </div>
                <div class="input-group half optional">
                    <label for="flow-poisto"><span id="t-flowpoisto">Poistoilma</span> <span class="opt-tag"
                            id="t-opt2">Valinn.</span></label>
                    <div class="input-wrapper">
                        <input type="number" step="0.01" id="flow-poisto" placeholder="esim. 1.0">
                        <span class="unit">m³/s</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="use-liquid" class="custom-checkbox">
                    <label for="use-liquid" class="checkbox-label" id="t-liquid-q">Lisätäänkö järjestelmään ulkoista
                        energiaa?</label>
                </div>
            </div>

            <div id="liquid-inputs" class="hidden-inputs">
                <div class="input-group">
                    <label for="gt40" id="t-gt40">Nestelämpötila tuloilmapatteri meno TE40 (°C)</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" id="gt40" placeholder="25.0">
                        <span class="unit">°C</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="gt41" id="t-gt41">Nestelämpötila tuloilmapatteri paluu TE41 (°C)</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" id="gt41" placeholder="20.0">
                        <span class="unit">°C</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="gt42" id="t-gt42">Nestelämpötila poistoilmapatteri paluu TE42 (°C)</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" id="gt42" placeholder="15.0">
                        <span class="unit">°C</span>
                    </div>
                </div>
            </div>

            <div class="input-group optional">
                <label for="jate"><span id="t-jate">Jäteilman lämpötila (°C)</span> <span class="opt-tag"
                        id="t-opt3">Valinnainen</span></label>
                <div class="input-wrapper">
                    <input type="number" step="0.1" id="jate" placeholder="2.0">
                    <span class="unit">°C</span>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <span id="t-submit">Laske Hyötysuhde</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </form>

        <div id="result-container" class="result-container hidden">
            <div class="result-card tulo">
                <h3 id="t-res1">Tuloilman hyötysuhde</h3>
                <div class="value-wrapper">
                    <span id="tulo-result">0</span><span class="percent">%</span>
                </div>
                <div class="progress-bar">
                    <div id="tulo-bar" class="progress-fill"></div>
                </div>
            </div>

            <div id="poisto-card" class="result-card poisto hidden">
                <h3 id="t-res2">Poistoilman hyötysuhde</h3>
                <div class="value-wrapper">
                    <span id="poisto-result">0</span><span class="percent">%</span>
                </div>
                <div class="progress-bar">
                    <div id="poisto-bar" class="progress-fill"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>

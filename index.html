<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECONET Laskin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>


<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="glass-container">
        <div class="top-controls"
            style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
            <button id="btn-history" class="icon-btn" title="Historia / History" style="opacity: 1;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </button>
            <div class="language-selector" style="margin-bottom: 0;">
                <button class="lang-btn active" data-lang="fi" title="Suomi">
                    <svg viewBox="0 0 18 11" width="24" height="15">
                        <rect width="18" height="11" fill="#fff" />
                        <rect width="18" height="3" y="4" fill="#003580" />
                        <rect width="3" height="11" x="5" fill="#003580" />
                    </svg>
                </button>
                <button class="lang-btn" data-lang="sv" title="Svenska">
                    <svg viewBox="0 0 16 10" width="24" height="15">
                        <rect width="16" height="10" fill="#006aa7" />
                        <rect width="16" height="2" y="4" fill="#fecc00" />
                        <rect width="2" height="10" x="5" fill="#fecc00" />
                    </svg>
                </button>
                <button class="lang-btn" data-lang="en" title="English">
                    <svg viewBox="0 0 60 30" width="24" height="12">
                        <clipPath id="s">
                            <path d="M0,0 v30 h60 v-30 z" />
                        </clipPath>
                        <clipPath id="t">
                            <path d="M30,15 h30 v15 z v-15 h-30 z h-30 v-15 z v15 h30 z" />
                        </clipPath>
                        <g clip-path="url(#s)">
                            <path d="M0,0 v30 h60 v-30 z" fill="#012169" />
                            <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6" />
                            <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#t)" stroke="#C8102E" stroke-width="4" />
                            <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10" />
                            <path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6" />
                        </g>
                    </svg>
                </button>
            </div>
        </div>

        <header>
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <h1 id="t-title">ECONET</h1>
            <p id="t-subtitle">Lämpötilahyötysuhteen laskin</p>
        </header>

        <form id="calculator-form">
            <div class="input-group">
                <label for="target-name" id="t-target-name">Kohteen / Projektin nimi</label>
                <div class="input-wrapper">
                    <input type="text" id="target-name" placeholder="esim. As Oy Esimerkki">
                </div>
            </div>

            <div class="input-group">
                <label for="ulko" id="t-ulko">Ulkoilman lämpötila (°C)</label>
                <div class="input-wrapper">
                    <input type="text" inputmode="text" id="ulko" required placeholder="-10.5" pattern="[0-9,\.\-]*">
                    <span class="unit">°C</span>
                </div>
            </div>

            <div class="input-group">
                <label for="tulo" id="t-tulo">Tuloilman lämpötila LTO jälkeen (°C)</label>
                <div class="input-wrapper">
                    <input type="text" inputmode="text" id="tulo" required placeholder="18.0" pattern="[0-9,\.\-]*">
                    <span class="unit">°C</span>
                </div>
            </div>

            <div class="input-group">
                <label for="poisto" id="t-poisto">Poistoilman lämpötila (°C)</label>
                <div class="input-wrapper">
                    <input type="text" inputmode="text" id="poisto" required placeholder="21.0" pattern="[0-9,\.\-]*">
                    <span class="unit">°C</span>
                </div>
            </div>

            <div class="flow-group">
                <div class="input-group half optional">
                    <label for="flow-tulo"><span id="t-flowtulo">Tuloilma</span> <span class="opt-tag"
                            id="t-opt1">Valinn.</span></label>
                    <div class="input-wrapper">
                        <input type="text" inputmode="text" id="flow-tulo" placeholder="esim. 0.8"
                            pattern="[0-9,\.\-]*">
                        <span class="unit">m³/s</span>
                    </div>
                </div>
                <div class="input-group half optional">
                    <label for="flow-poisto"><span id="t-flowpoisto">Poistoilma</span> <span class="opt-tag"
                            id="t-opt2">Valinn.</span></label>
                    <div class="input-wrapper">
                        <input type="text" inputmode="text" id="flow-poisto" placeholder="esim. 1.0"
                            pattern="[0-9,\.\-]*">
                        <span class="unit">m³/s</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="use-liquid" class="custom-checkbox">
                    <label for="use-liquid" class="checkbox-label" id="t-liquid-q">Lisätäänkö järjestelmään ulkoista
                        energiaa?</label>
                </div>
            </div>

            <div id="liquid-inputs" class="hidden-inputs">
                <div class="input-group">
                    <label for="gt40" id="t-gt40">Nestelämpötila tuloilmapatteri meno TE40 (°C)</label>
                    <div class="input-wrapper">
                        <input type="text" inputmode="text" id="gt40" placeholder="25.0" pattern="[0-9,\.\-]*">
                        <span class="unit">°C</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="gt41" id="t-gt41">Nestelämpötila tuloilmapatteri paluu TE41 (°C)</label>
                    <div class="input-wrapper">
                        <input type="text" inputmode="text" id="gt41" placeholder="20.0" pattern="[0-9,\.\-]*">
                        <span class="unit">°C</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="gt42" id="t-gt42">Nestelämpötila poistoilmapatteri paluu GT42 (°C)</label>
                    <div class="input-wrapper">
                        <input type="text" inputmode="text" id="gt42" placeholder="15.0" pattern="[0-9,\.\-]*">
                        <span class="unit">°C</span>
                    </div>
                </div>

                <div class="flow-group">
                    <div class="input-group half optional">
                        <label for="flow-liquid"><span id="t-liquid-flow">Nestevirta</span> <span class="opt-tag"
                                id="t-opt4">Valinn.</span></label>
                        <div class="input-wrapper">
                            <input type="text" inputmode="text" id="flow-liquid" placeholder="esim. 0.5"
                                pattern="[0-9,\.\-]*">
                            <span class="unit">l/s</span>
                        </div>
                    </div>
                    <div class="input-group half optional">
                        <label for="eg-pct"><span id="t-eg-pct">EG pitoisuus</span> <span class="opt-tag"
                                id="t-opt5">Valinn.</span></label>
                        <div class="input-wrapper">
                            <input type="text" inputmode="text" id="eg-pct" placeholder="esim. 30"
                                pattern="[0-9,\.\-]*">
                            <span class="unit">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-group optional">
                <label for="jate"><span id="t-jate">Jäteilman lämpötila (°C)</span> <span class="opt-tag"
                        id="t-opt3">Valinnainen</span></label>
                <div class="input-wrapper">
                    <input type="text" inputmode="text" id="jate" placeholder="2.0" pattern="[0-9,\.\-]*">
                    <span class="unit">°C</span>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <span id="t-submit">Laske Hyötysuhde</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </form>

        <div id="result-container" class="result-container hidden">
            <div class="result-card tulo">
                <h3 id="t-res1">Tuloilman hyötysuhde</h3>
                <div class="value-wrapper">
                    <span id="tulo-result">0</span><span class="percent">%</span>
                </div>
                <div class="progress-bar">
                    <div id="tulo-bar" class="progress-fill"></div>
                </div>
            </div>

            <div id="poisto-card" class="result-card poisto hidden">
                <h3 id="t-res2">Poistoilman hyötysuhde</h3>
                <div class="value-wrapper">
                    <span id="poisto-result">0</span><span class="percent">%</span>
                </div>
                <div class="progress-bar">
                    <div id="poisto-bar" class="progress-fill"></div>
                </div>
            </div>

            <div id="tulo-teho-container" class="hidden" style="margin-bottom: 16px;">
                <h3 id="t-tulo-patteri-otsikko"
                    style="font-size: 0.875rem; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">
                    Tuloilmapatterin tehot</h3>
                <div style="display: flex; gap: 16px;">
                    <div id="tulo-ilma-teho-card" class="result-card" style="flex: 1; padding: 15px;">
                        <h4 id="t-res-tulo-ilma-teho"
                            style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">
                            Ilmapuoli</h4>
                        <div class="value-wrapper" style="margin-bottom: 0;">
                            <span id="tulo-ilma-teho-result" style="font-size: 1.8rem; font-weight: 700;">0</span><span
                                class="percent"> kW</span>
                        </div>
                    </div>
                    <div id="tulo-neste-teho-card" class="result-card" style="flex: 1; padding: 15px;">
                        <h4 id="t-res-tulo-neste-teho"
                            style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">
                            Nestepuoli</h4>
                        <div class="value-wrapper" style="margin-bottom: 0;">
                            <span id="tulo-neste-teho-result" style="font-size: 1.8rem; font-weight: 700;">0</span><span
                                class="percent"> kW</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="poisto-teho-container" class="hidden" style="margin-bottom: 16px;">
                <h3 id="t-poisto-patteri-otsikko"
                    style="font-size: 0.875rem; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">
                    Poistoilmapatterin tehot</h3>
                <div style="display: flex; gap: 16px;">
                    <div id="poisto-ilma-teho-card" class="result-card" style="flex: 1; padding: 15px;">
                        <h4 id="t-res-poisto-ilma-teho"
                            style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">
                            Ilmapuoli</h4>
                        <div class="value-wrapper" style="margin-bottom: 0;">
                            <span id="poisto-ilma-teho-result"
                                style="font-size: 1.8rem; font-weight: 700;">0</span><span class="percent"> kW</span>
                        </div>
                    </div>
                    <div id="poisto-neste-teho-card" class="result-card" style="flex: 1; padding: 15px;">
                        <h4 id="t-res-poisto-neste-teho"
                            style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase;">
                            Nestepuoli</h4>
                        <div class="value-wrapper" style="margin-bottom: 0;">
                            <span id="poisto-neste-teho-result"
                                style="font-size: 1.8rem; font-weight: 700;">0</span><span class="percent"> kW</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="ulkoinen-teho-container" class="hidden" style="margin-bottom: 16px;">
                <h3 id="t-ulkoinen-teho-otsikko"
                    style="font-size: 0.875rem; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">
                    Ulkoisen energian teho</h3>
                <div class="result-card" style="padding: 15px;">
                    <div class="value-wrapper" style="margin-bottom: 0;">
                        <span id="ulkoinen-teho-result" style="font-size: 1.8rem; font-weight: 700;">0</span><span
                            class="percent"> kW</span>
                    </div>
                </div>
            </div>

            <div id="action-buttons" class="action-buttons" style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="button" id="btn-save" class="btn-secondary"
                    style="flex: 1; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    <span id="t-btn-save">Tallenna</span>
                </button>
                <button type="button" id="btn-email" class="btn-secondary"
                    style="flex: 1; padding: 12px; border-radius: 12px; background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); color: white; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <span id="t-btn-email">Sähköposti</span>
                </button>
            </div>
        </div>
    </main>

    <!-- History Modal -->
    <div id="history-modal" class="modal hidden"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 100; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s;">
        <div class="modal-content glass-container"
            style="max-height: 90vh; display: flex; flex-direction: column; opacity: 1; transform: translateY(0); margin: 20px;">
            <div class="modal-header"
                style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 15px;">
                <h2 id="t-history-title" style="margin: 0; font-size: 1.5rem;">Tallennushistoria</h2>
                <button id="btn-close-history"
                    style="background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="history-list" class="history-list"
                style="overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; padding-right: 5px;">
                <!-- History items will be injected here -->
            </div>
            <div class="modal-actions"
                style="margin-top: 20px; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <button id="btn-clear-history"
                    style="flex: 1; padding: 12px; border-radius: 12px; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: white; cursor: pointer; font-weight: 600;"><span
                        id="t-clear-history">Tyhjennä historia</span></button>
                <button id="btn-export-csv"
                    style="flex: 1; padding: 12px; border-radius: 12px; background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); color: white; cursor: pointer; font-weight: 600;"><span
                        id="t-export-csv">Lataa CSV</span></button>
            </div>
        </div>
    </div>

    <!-- Visual Diagram Template -->
    <template id="visual-diagram-template">
        <div class="econet-diagram">
            <div class="diagram-row exhaust" style="height: 100px; display: block; position: relative;">
                <div class="pipe-horizontal" style="top: 50%;"></div>
                <div class="flow-arrow-left" style="top: calc(50% - 4px);"></div>

                <div class="diagram-fan" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%);">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" style="width: 100%; height: 100%;">
                        <circle cx="12" cy="12" r="11"></circle>
                        <path d="M 16 6 L 6 12 L 16 18 Z" />
                    </svg>
                    <span class="diagram-label flow-lbl val-flow-poisto"
                        style="position: absolute; bottom: -24px; white-space: nowrap;">-</span>
                </div>

                <div class="diagram-block"
                    style="position: absolute; left: 70px; top: 50%; transform: translateY(-50%);">
                    <span class="diagram-label t-jate-lbl">Jäte (GT21)</span>
                    <span class="diagram-badge val-jate">-</span>
                </div>

                <div
                    style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 2;">
                    <span class="diagram-badge val-poisto-p-ilma"
                        style="background: rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.6); font-size: 0.65rem; min-width: 40px;"
                        title="Ilmapuoli">-</span>
                    <div class="diagram-coil"></div>
                </div>

                <div class="diagram-block"
                    style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%);">
                    <span class="diagram-label t-poisto-lbl">Poisto (GT20)</span>
                    <span class="diagram-badge val-poisto">-</span>
                </div>
            </div>

            <div class="diagram-middle" style="height: 260px;">
                <div class="pipe-vertical pipe-left"></div>
                <div class="pipe-vertical pipe-right"></div>

                <!-- Hyötysuhteet -->
                <div class="diagram-block"
                    style="position: absolute; left: 5%; top: 50%; transform: translateY(-50%); align-items: flex-start; z-index: 4;">
                    <span class="diagram-label t-diagram-res2" style="margin-bottom: 2px;">Poistoilman hyötysuhde</span>
                    <span class="diagram-badge val-poisto-hyoty"
                        style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); font-size: 0.85rem; min-width: 50px; color: #fca5a5; margin-bottom: 40px;">-</span>

                    <span class="diagram-label t-diagram-res1" style="margin-bottom: 2px;">Tuloilman hyötysuhde</span>
                    <span class="diagram-badge val-tulo-hyoty"
                        style="background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); font-size: 0.85rem; min-width: 50px; color: #93c5fd;">-</span>
                </div>

                <!-- Bypass Line -->
                <div class="pipe-bypass"
                    style="position: absolute; top: 45px; height: 4px; background: rgba(255,255,255,0.15); left: calc(50% - 40px); right: calc(50% - 40px); z-index: 1;">
                </div>

                <!-- Nestepuolen teho (Poisto) putkien väliin ylös -->
                <div style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 4;">
                    <span class="diagram-badge val-poisto-p-neste"
                        style="background: rgba(139, 92, 246, 0.4); border-color: rgba(139, 92, 246, 0.6); font-size: 0.65rem; min-width: 40px;"
                        title="Nestepuoli">-</span>
                </div>

                <!-- 3-Way Valve (SV40) -->
                <div style="z-index: 4; position: absolute; right: calc(50% - 38px); top: 45px;">
                    <div
                        style="position: absolute; right: -16px; top: -16px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"
                            style="width: 100%; height: 100%; fill: #0f172a; stroke: rgba(255,255,255,0.8); stroke-width: 2;">
                            <path d="M 16 16 L 4 8 L 4 24 Z" />
                            <path d="M 16 16 L 10 4 L 22 4 Z" />
                            <path d="M 16 16 L 10 28 L 22 28 Z" />
                        </svg>
                    </div>
                    <span class="diagram-label"
                        style="font-size: 0.65rem; position: absolute; left: 20px; top: -6px; white-space: nowrap;">SV40</span>
                </div>

                <!-- GT42 Just below SV40 -->
                <div class="diagram-block" style="position: absolute; right: 18%; top: 60px;">
                    <span class="diagram-label t-gt42-lbl">GT42 (Paluu)</span>
                    <span class="diagram-badge val-gt42">-</span>
                </div>

                <!-- Lisäenergia Pipes ja Lisäteho -->
                <div class="lisateho-boundary" style="position: absolute; right: 22%; top: 90px; height: 60px; width: 1px; border-right: 1px dashed rgba(255,255,255,0.4); z-index: 1;"></div>
                
                <div class="pipe-lisateho" style="position: absolute; right: 22%; top: 105px; height: 4px; background: rgba(255,255,255,0.15); left: calc(50% + 40px); z-index: 1;">
                   <div class="flow-arrow-right" style="position: absolute; top: 0; width: 100%;"></div>
                </div>
                
                <div class="pipe-lisateho" style="position: absolute; right: 22%; top: 135px; height: 4px; background: rgba(255,255,255,0.15); left: calc(50% + 40px); z-index: 1;">
                   <div class="flow-arrow-left" style="position: absolute; top: 0; width: 100%;"></div>
                </div>

                <div class="diagram-block" style="z-index: 4; position: absolute; right: 2%; top: 108px; align-items: flex-end;">
                    <span class="diagram-label t-lisateho-lbl">Lisäteho</span>
                    <span class="diagram-badge val-ulkoinen-teho" style="background: rgba(245, 158, 11, 0.4); color: #fff; padding: 2px 6px; font-size: 0.75rem; min-width: 50px; border-radius: 4px; border: 1px solid rgba(245, 158, 11, 0.6);">-</span>
